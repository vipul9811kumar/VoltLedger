version: '3.9'

# VoltLedger local development stack
# Run: pnpm infra:up
# Stop: pnpm infra:down

services:
  postgres:
    image: postgres:16-alpine
    container_name: voltledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voltledger
      POSTGRES_PASSWORD: voltledger
      POSTGRES_DB: voltledger
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltledger']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: voltledger-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: pgAdmin for DB inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voltledger-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@voltledger.dev
      PGADMIN_DEFAULT_PASSWORD: voltledger
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools   # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
